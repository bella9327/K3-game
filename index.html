<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>一分鐘讀字：童趣繪本配對遊戲</title>
    <style>
        /* 引入圓潤可愛的 Google 字型 */
        @import url('https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Sans+TC:wght@500;700&display=swap');

        * {
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Noto Sans TC', -apple-system, sans-serif;
            /* 繪本風溫暖底色，帶有淡淡的雲朵感 */
            background-color: #fbf6ee; 
            background-image: radial-gradient(#f0e5d8 1px, transparent 0);
            background-size: 24px 24px;
            margin: 0;
            padding: 15px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 460px;
            margin: 0 auto;
            text-align: center;
        }

        /* 像繪本標題一樣的設計 */
        h1 {
            font-family: 'ZCOOL KuaiLe', 'Noto Sans TC', cursive;
            color: #6d4c41;
            font-size: 26px;
            margin: 5px 0 15px 0;
            text-shadow: 2px 2px 0px #fff;
            letter-spacing: 1px;
        }

        /* 溫馨的手繪風資訊欄 */
        #info-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #fff9f2;
            padding: 12px 20px;
            border-radius: 20px;
            margin-bottom: 18px;
            border: 3px dashed #dfd3c3;
            box-shadow: 0 4px 0px #dfd3c3;
        }

        #score-panel, #timer-panel {
            font-size: 16px;
            font-weight: 700;
            color: #8d6e63;
        }
        
        #timer, #matches-count {
            font-size: 18px;
            color: #d87073;
        }

        #game-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-gap: 12px;
            perspective: 1000px;
            margin-bottom: 25px;
        }

        /* 卡片主體 */
        .card {
            background-color: transparent;
            aspect-ratio: 1 / 1;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.2);
            cursor: pointer;
        }

        .card.flip {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            width: 100%;
            height: 100%;
            position: absolute;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 18px;
        }

        /* 卡片背面：粉藍色配溫馨小插圖感 */
        .card-front {
            background: #aed6f1;
            border: 4px solid #fff;
            box-shadow: 0 6px 0px #85b3d1, 0 10px 15px rgba(0,0,0,0.05);
            color: #fff;
            font-size: 36px;
            font-family: 'ZCOOL KuaiLe', sans-serif;
            text-shadow: 2px 2px 0px #85b3d1;
        }

        /* 卡片正面 */
        .card-back {
            background-color: #ffffff;
            color: #4e342e;
            transform: rotateY(180deg);
            border: 4px solid #fff;
            box-shadow: 0 6px 0px #e0e0e0, 0 10px 15px rgba(0,0,0,0.05);
            padding: 8px;
        }

        /* 答對時的綠色邊框提示 */
        .card.match .card-back {
            background-color: #f7fdf9;
            box-shadow: 0 6px 0px #abebd0;
        }
        
        /* 發現錯誤時的果凍彈跳動畫 */
        .card.wrong-jelly {
            animation: jelly 0.6s ease-in-out;
        }

        /* 漢字樣式：大字、粗體、帶有故事書感 */
        .word-card {
            font-size: 26px;
            font-weight: 700;
            color: #5d4037;
        }

        .image-card {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .image-card img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
        }

        /* 重新開始按鈕：像一塊大餅乾 */
        button {
            width: 100%;
            padding: 15px;
            font-family: 'Noto Sans TC', sans-serif;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 25px;
            background-color: #ffb37e;
            color: white;
            box-shadow: 0 6px 0px #e0925c;
            transition: all 0.1s ease;
        }

        button:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0px #e0925c;
        }

        /* 果凍彈跳特效（保持翻開 180 度狀態下縮放） */
        @keyframes jelly {
            0% { transform: rotateY(180deg) scale(1); }
            30% { transform: rotateY(180deg) scale(1.15, 0.85); }
            40% { transform: rotateY(180deg) scale(0.85, 1.15); }
            60% { transform: rotateY(180deg) scale(1.05, 0.95); }
            100% { transform: rotateY(180deg) scale(1); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>✨ 一分鐘中文字詞配對遊戲 ✨</h1>

        <div id="info-bar">
            <div id="score-panel">🎈 已找到: <span id="matches-count">0</span> / 6</div>
            <div id="timer-panel">⏱️ 時間: <span id="timer">0</span> 秒</div>
        </div>

        <div id="game-board"></div>

        <button id="restart-btn">🍭 重新開始玩</button>
    </div>

    <script>
        const gameData = [
            { word: '飛鳥', image: 'https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjEB932hVgaKyqyxeyF06KSDpf1rdTcb0ThAPck3ITd2-YlUkv1lEg5LP31-hrbM803OSOik5fgjSWVU3rIvq137LvTet6dAKjoIZk_cMvIHitiYuLmmFES0lRBe7xeD2cUIyOkadngF1IH/s800/bird_aoitori_bluebird.png' },
            { word: '小狗', image: 'https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEitxnXh3BCHXlUOIPJdO1y51fEPdGCGf9bImEnIUVo_uPy5ECws2w1iAI2wrDs8Sc0oVbtdnYZvFG5UzykV-qvcWamD-Wyj6MOvh6UCTXHPH-5Xf-B5tH-8BqYSvw4roWyud7AgdE_3eXc/s800/pet_omocha_inu.png' },
            { word: '老師', image: 'https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhm_E-H-K-_FgN2faRN8GBGyLGYlBRd7ableXu-UkGQQHSUai1QJpssQsdbjG_JgTOsqL0HB5IuINGRf4jtaT5PmprKYOt0fWzFi6THUTi2-JfCDFdHbtnSCRRiWwrlrcTBq-1MMPVzedw/s800/kid_job_girl_teacher.png' },
            { word: '護士', image: 'https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEi0Xif0qqyS8Xu38KMrotkfwCIJlmgjJR5AG9h81a7ZLd9k6qJRgNht3JRXuS7WZwvrCH113634NAm-VUT51gm3C96ieLUcQ_jcds5tkPTOKRhLJ3KStuAKECoi9DscMW8r6TDNwKTlxCs/s800/nurse03_smile.png' },
            { word: '星星', image: 'https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjaSRety8gtS7fw4SZ6uMq1z3J9QNT8Lm7S1MtEKHhB3D0nOvNIPmSo72EhaaWLgF6GnhQNOqyFKG6XL2ceUwwP4bAKJiqk4ngiDbjfgIrBLTuKVGhMJCp8yE9QwjeirNOOOg35IYJpNPJY/s800/small_star7_yellow.png' },
            { word: '月餅', image: 'https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhT_JHjk1x9QNTcDwrwF3gdhfaK6Scoso10UeoazCdIXYGpn412_2UYSn79CQPrKl0bBs0N9dxQ5TWuVrtvY9kkQUF4dbM8W1S8nBfaHsaSVltIykcDANCHo0JVXXTRGNk1EovoA8IR9n-C/s800/sweets_geppei.png' }
        ];

        let cards = [];
        let hasFlippedCard = false;
        let lockBoard = false;
        let firstCard, secondCard;
        let matchesFound = 0;
        let timerInterval;
        let secondsElapsed = 0;

        const gameBoard = document.getElementById('game-board');
        const matchesCountSpan = document.getElementById('matches-count');
        const restartBtn = document.getElementById('restart-btn');
        const timerSpan = document.getElementById('timer');

        function startTimer() {
            clearInterval(timerInterval);
            secondsElapsed = 0;
            timerSpan.textContent = secondsElapsed;
            timerInterval = setInterval(() => {
                secondsElapsed++;
                timerSpan.textContent = secondsElapsed;
            }, 1000);
        }

        function initGame() {
            gameBoard.innerHTML = '';
            matchesFound = 0;
            matchesCountSpan.textContent = matchesFound;
            
            const wordCards = gameData.map(item => ({ ...item, type: 'word' }));
            const imageCards = gameData.map(item => ({ ...item, type: 'image' }));

            cards = [...wordCards, ...imageCards].sort(() => 0.5 - Math.random());

            cards.forEach((cardData) => {
                const card = document.createElement('div');
                card.classList.add('card');
                card.dataset.id = cardData.word;

                const front = document.createElement('div');
                front.classList.add('card-front');
                front.textContent = '👆🏻';
    
                const back = document.createElement('div');
                back.classList.add('card-back');

                if (cardData.type === 'word') {
                    back.classList.add('word-card');
                    back.textContent = cardData.word;
                } else {
                    back.classList.add('image-card');
                    const img = document.createElement('img');
                    img.src = cardData.image;
                    img.alt = cardData.word;
                    
                    img.onerror = function() {
                        const fallbacks = { '飛鳥':'🕊️', '小狗':'🐶', '老師':'👨‍🏫', '護士':'👩‍⚕️', '星星':'⭐', '月餅':'🥮' };
                        back.innerHTML = `<span style="font-size: 46px;">${fallbacks[cardData.word] || '🖼️'}</span>`;
                    };
                    back.appendChild(img);
                }

                card.appendChild(front);
                card.appendChild(back);
                card.addEventListener('click', flipCard);
                gameBoard.appendChild(card);
            });

            startTimer();
        }

        function flipCard() {
            if (lockBoard) return;
            if (this === firstCard) return;

            this.classList.add('flip');

            if (!hasFlippedCard) {
                hasFlippedCard = true;
                firstCard = this;
                return;
            }

            secondCard = this;
            
            // 鎖定面板，直到檢查結束，防止連點干擾動畫
            lockBoard = true; 
            
            // 稍微等待翻牌動畫完成後（約400毫秒），再進行配對判定
            setTimeout(checkForMatch, 400);
        }

        function checkForMatch() {
            let isMatch = firstCard.dataset.id === secondCard.dataset.id;
            isMatch ? disableCards() : unflipCards();
        }

        function disableCards() {
            firstCard.removeEventListener('click', flipCard);
            secondCard.removeEventListener('click', flipCard);
            
            firstCard.classList.add('match');
            secondCard.classList.add('match');

            matchesFound++;
            matchesCountSpan.textContent = matchesFound;

            if (matchesFound === gameData.length) {
                clearInterval(timerInterval);
                setTimeout(() => {
                    alert(`🎉 太棒了！你只花了 ${secondsElapsed} 秒就完成了配對！`);
                }, 500);
            }

            resetBoard();
        }

        function unflipCards() {
            // 發現錯了：先觸發果凍彈跳動畫
            firstCard.classList.add('wrong-jelly');
            secondCard.classList.add('wrong-jelly');

            // 讓小朋友有充足時間（1.0秒）看清楚卡片內容並感受彈跳效果，隨後才翻回去
            setTimeout(() => {
                firstCard.classList.remove('flip', 'wrong-jelly');
                secondCard.classList.remove('flip', 'wrong-jelly');
                resetBoard();
            }, 1000);
        }

        function resetBoard() {
            [hasFlippedCard, lockBoard] = [false, false];
            [firstCard, secondCard] = [null, null];
        }

        restartBtn.addEventListener('click', initGame);
        initGame();
    </script>
</body>
</html>
