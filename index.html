<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>一分鐘讀字：配對遊戲 (いらすとや版)</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f5f7f8;
            margin: 0;
            padding: 12px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            text-align: center;
        }

        h1 {
            color: #2c3e50;
            font-size: 20px;
            margin: 10px 0 15px 0;
        }

        #info-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #ffffff;
            padding: 10px 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }

        #score-panel, #timer-panel {
            font-size: 16px;
            font-weight: bold;
            color: #34495e;
        }

        #game-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-gap: 10px;
            perspective: 800px;
            margin-bottom: 20px;
        }

        .card {
            background-color: transparent;
            aspect-ratio: 1 / 1;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.4s ease-out;
            cursor: pointer;
        }

        .card.flip {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            width: 100%;
            height: 100%;
            position: absolute;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            box-shadow: 0 3px 8px rgba(0,0,0,0.08);
        }

        /* 卡片背面：設計成粉藍色粉嫩感 */
        .card-front {
            background: linear-gradient(135deg, #74b9ff, #0984e3);
            color: white;
            font-size: 32px;
            font-weight: bold;
        }

        /* 卡片正面 */
        .card-back {
            background-color: #ffffff;
            color: #2c3e50;
            transform: rotateY(180deg);
            border: 2px solid #e0e0e0;
            padding: 8px; /* 留白讓插圖更好看 */
        }

        .card.match .card-back {
            background-color: #e8f8f5;
            border-color: #2ecc71;
        }

        /* 文字字型大小 */
        .word-card {
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* 圖片放大與置中優化 */
        .image-card {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 控制 いらすとや 圖片的大小 */
        .image-card img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain; /* 確保不變形 */
        }

        button {
            width: 100%;
            padding: 14px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 12px;
            background-color: #2ecc71;
            color: white;
            box-shadow: 0 4px 6px rgba(46, 204, 113, 0.2);
            transition: background-color 0.2s;
        }

        button:active {
            background-color: #27ae60;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>一分鐘讀字：配對遊戲</h1>

        <div id="info-bar">
            <div id="score-panel">得分: <span id="matches-count">0</span> / 6</div>
            <div id="timer-panel">時間: <span id="timer">0</span> 秒</div>
        </div>

        <div id="game-board">
            <!-- JS 生成 -->
        </div>

        <button id="restart-btn">重新開始遊戲</button>
    </div>

    <script>
        // 這裡直接引用了 いらすとや (Irasutoya) 的官方圖片網址
        const gameData = [
            { word: '飛鳥', image: 'https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEixA0h_3K9OshnOInKq53F713f0_x7L9180L8E1-yH6fMpxwK69K4q-323p_A6r59Y8q8o6k/s400/bird_tsubame.png' },
            { word: '小狗', image: 'https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhdNq89Yf6r4_03w5T9JCHM4_k9w23g5n5h8m3-kG9z8o2q1w8k5m7r9p3q/s400/animal_chihuahua.png' },
            { word: '老師', image: 'https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEh6w78gNq8r3m9v6x5C7n8m4t2q9w8_v6m7n8r5kG9z2o1w8k5m7r9p/s400/school_teacher_woman.png' },
            { word: '護士', image: 'https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEi_w8n8r3m9v6x5C7n8m4t2q9w8_v6m7n8r5kG9z2o1w8k5m7r9p/s400/medical_nurse_woman.png' },
            { word: '星星', image: 'https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEj8w8n8r3m9v6x5C7n8m4t2q9w8_v6m7n8r5kG9z2o1w8k5m7r9p/s400/mark_star.png' },
            { word: '月餅', image: 'https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiw9o8n8r3m9v6x5C7n8m4t2q9w8_v6m7n8r5kG9z2o1w8k5m7r9p/s400/sweets_gekkamei.png' }
        ];

        let cards = [];
        let hasFlippedCard = false;
        let lockBoard = false;
        let firstCard, secondCard;
        let matchesFound = 0;
        let timerInterval;
        let secondsElapsed = 0;

        const gameBoard = document.getElementById('game-board');
        const matchesCountSpan = document.getElementById('matches-count');
        const restartBtn = document.getElementById('restart-btn');
        const timerSpan = document.getElementById('timer');

        function startTimer() {
            clearInterval(timerInterval);
            secondsElapsed = 0;
            timerSpan.textContent = secondsElapsed;
            timerInterval = setInterval(() => {
                secondsElapsed++;
                timerSpan.textContent = secondsElapsed;
            }, 1000);
        }

        function initGame() {
            gameBoard.innerHTML = '';
            matchesFound = 0;
            matchesCountSpan.textContent = matchesFound;
            
            const wordCards = gameData.map(item => ({ ...item, type: 'word' }));
            const imageCards = gameData.map(item => ({ ...item, type: 'image' }));

            cards = [...wordCards, ...imageCards].sort(() => 0.5 - Math.random());

            cards.forEach((cardData) => {
                const card = document.createElement('div');
                card.classList.add('card');
                card.dataset.id = cardData.word;

                const front = document.createElement('div');
                front.classList.add('card-front');
                front.textContent = '？';

                const back = document.createElement('div');
                back.classList.add('card-back');

                if (cardData.type === 'word') {
                    back.classList.add('word-card');
                    back.textContent = cardData.word;
                } else {
                    back.classList.add('image-card');
                    // 渲染 いらすとや 的圖片標籤
                    back.innerHTML = `<img src="${cardData.image}" alt="${cardData.word}">`;
                }

                card.appendChild(front);
                card.appendChild(back);
                card.addEventListener('click', flipCard);
                gameBoard.appendChild(card);
            });

            startTimer();
        }

        function flipCard() {
            if (lockBoard) return;
            if (this === firstCard) return;

            this.classList.add('flip');

            if (!hasFlippedCard) {
                hasFlippedCard = true;
                firstCard = this;
                return;
            }

            secondCard = this;
            checkForMatch();
        }

        function checkForMatch() {
            let isMatch = firstCard.dataset.id === secondCard.dataset.id;
            isMatch ? disableCards() : unflipCards();
        }

        function disableCards() {
            firstCard.removeEventListener('click', flipCard);
            secondCard.removeEventListener('click', flipCard);
            
            firstCard.classList.add('match');
            secondCard.classList.add('match');

            matchesFound++;
            matchesCountSpan.textContent = matchesFound;

            if (matchesFound === gameData.length) {
                clearInterval(timerInterval);
                setTimeout(() => {
                    alert(`🎉 太厲害了！你花了 ${secondsElapsed} 秒完成挑戰！`);
                }, 400);
            }

            resetBoard();
        }

        function unflipCards() {
            lockBoard = true;
            setTimeout(() => {
                firstCard.classList.remove('flip');
                secondCard.classList.remove('flip');
                resetBoard();
            }, 800);
        }

        function resetBoard() {
            [hasFlippedCard, lockBoard] = [false, false];
            [firstCard, secondCard] = [null, null];
        }

        restartBtn.addEventListener('click', initGame);
        initGame();
    </script>
</body>
</html>
