<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>一分鐘中文配對遊戲（人物篇）</title>
    <style>
        /* 引入圓潤可愛的 Google 字型 */
        @import url('https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Sans+TC:wght@500;700&display=swap');

        * {
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Noto Sans TC', -apple-system, sans-serif;
            background-color: #fbf6ee; 
            background-image: radial-gradient(#f0e5d8 1px, transparent 0);
            background-size: 24px 24px;
            margin: 0;
            padding: 10px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 460px;
            margin: 0 auto;
            text-align: center;
        }

        h1 {
            font-family: 'ZCOOL KuaiLe', 'Noto Sans TC', cursive;
            color: #6d4c41;
            font-size: 24px;
            margin: 5px 0 10px 0;
            text-shadow: 2px 2px 0px #fff;
            letter-spacing: 1px;
        }

        /* 難度選擇按鈕區 */
        .level-selector {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 12px;
        }

        .level-btn {
            flex: 1;
            padding: 8px 5px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 15px;
            background-color: #fff9f2;
            color: #8d6e63;
            border: 2px solid #dfd3c3;
            box-shadow: 0 3px 0px #dfd3c3;
            cursor: pointer;
            transition: all 0.1s ease;
        }

        .level-btn.active {
            background-color: #aed6f1;
            color: white;
            border-color: #85b3d1;
            box-shadow: 0 3px 0px #85b3d1;
            transform: translateY(2px);
        }

        /* 溫馨的手繪風資訊欄 */
        #info-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #fff9f2;
            padding: 10px 15px;
            border-radius: 20px;
            margin-bottom: 15px;
            border: 3px dashed #dfd3c3;
            box-shadow: 0 4px 0px #dfd3c3;
        }

        #score-panel, #timer-panel {
            font-size: 15px;
            font-weight: 700;
            color: #8d6e63;
        }
        
        #timer, #matches-count {
            font-size: 16px;
            color: #d87073;
        }

        /* 預設簡單版（3欄） */
        #game-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-gap: 10px;
            perspective: 1000px;
            margin-bottom: 20px;
        }

        /* 當切換到普通或困難時，自動變 4 欄 */
        #game-board.grid-4 {
            grid-template-columns: repeat(4, 1fr);
            grid-gap: 8px;
        }

        /* 卡片主體 */
        .card {
            background-color: transparent;
            aspect-ratio: 1 / 1;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.2);
            cursor: pointer;
        }

        .card.flip {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            width: 100%;
            height: 100%;
            position: absolute;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 14px;
        }

        /* 卡片正面：使用您提供的精美底圖 */
        .card-front {
            background: url('https://cdn.phototourl.com/free/2026-06-05-26f085c4-f366-4a50-bfaa-992bd501dba9.jpg') no-repeat center center;
            background-size: cover;
            border: 3px solid #fff;
            box-shadow: 0 5px 0px #dfd3c3, 0 8px 12px rgba(0,0,0,0.05);
            color: transparent;
        }

        /* 卡片背面內容 */
        .card-back {
            background-color: #ffffff;
            color: #4e342e;
            transform: rotateY(180deg);
            border: 3px solid #fff;
            box-shadow: 0 5px 0px #e0e0e0, 0 8px 12px rgba(0,0,0,0.05);
            padding: 4px;
        }

        /* 答對時的綠色邊框提示 */
        .card.match .card-back {
            background-color: #f7fdf9;
            box-shadow: 0 5px 0px #abebd0;
        }
        
        /* 發現錯誤時的左右搖晃動畫 */
        .card.shake {
            animation: shake 0.4s ease-in-out;
        }

        /* 漢字樣式：自動縮小字型以防困難版塞不下 */
        .word-card {
            font-size: 20px;
            font-weight: 700;
            color: #5d4037;
            letter-spacing: 0px;
        }
        
        /* 在 3 欄（簡單版）時稍微放大字型 */
        #game-board:not(.grid-4) .word-card {
            font-size: 24px;
        }

        .image-card {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .image-card img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
        }

        /* 重新開始按鈕 */
        .restart-btn {
            width: 100%;
            padding: 14px;
            font-family: 'Noto Sans TC', sans-serif;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 25px;
            background-color: #ffb37e;
            color: white;
            box-shadow: 0 5px 0px #e0925c;
            transition: all 0.1s ease;
        }

        .restart-btn:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0px #e0925c;
        }

        /* 答錯左右搖晃特效 */
        @keyframes shake {
            0%, 100% { transform: rotateY(180deg) translateX(0); }
            20%, 60% { transform: rotateY(180deg) translateX(-6px); }
            40%, 80% { transform: rotateY(180deg) translateX(6px); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>✨ 一分鐘中文字詞配對遊戲 ✨</h1>

        <div class="level-selector">
            <button class="level-btn active" onclick="changeLevel(6, this)">🌱 簡單 (6對)</button>
            <button class="level-btn" onclick="changeLevel(8, this)">🌲 普通 (8對)</button>
            <button class="level-btn" onclick="changeLevel(10, this)">🌋 困難 (10對)</button>
        </div>

        <div id="info-bar">
            <div id="score-panel">✏️ 已找到: <span id="matches-count">0</span> / <span id="total-pairs">6</span></div>
            <div id="timer-panel">⏱️ 時間: <span id="timer">0</span> 秒</div>
        </div>

        <div id="game-board"></div>

        <button class="restart-btn" id="restart-btn">🔄 重新開始玩</button>
    </div>

    <script>
        // 完整的 10 對字詞與圖片資料庫
        const fullGameData = [
            { word: '飛鳥', image: 'https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjEB932hVgaKyqyxeyF06KSDpf1rdTcb0ThAPck3ITd2-YlUkv1lEg5LP31-hrbM803OSOik5fgjSWVU3rIvq137LvTet6dAKjoIZk_cMvIHitiYuLmmFES0lRBe7xeD2cUIyOkadngF1IH/s800/bird_aoitori_bluebird.png' },
            { word: '小狗', image: 'https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEitxnXh3BCHXlUOIPJdO1y51fEPdGCGf9bImEnIUVo_uPy5ECws2w1iAI2wrDs8Sc0oVbtdnYZvFG5UzykV-qvcWamD-Wyj6MOvh6UCTXHPH-5Xf-B5tH-8BqYSvw4roWyud7AgdE_3eXc/s800/pet_omocha_inu.png' },
            { word: '老師', image: 'https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhm_E-H-K-_FgN2faRN8GBGyLGYlBRd7ableXu-UkGQQHSUai1QJpssQsdbjG_JgTOsqL0HB5IuINGRf4jtaT5PmprKYOt0fWzFi6THUTi2-JfCDFdHbtnSCRRiWwrlrcTBq-1MMPVzedw/s800/kid_job_girl_teacher.png' },
            { word: '護士', image: 'https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEi0Xif0qqyS8Xu38KMrotkfwCIJlmgjJR5AG9h81a7ZLd9k6qJRgNht3JRXuS7WZwvrCH113634NAm-VUT51gm3C96ieLUcQ_jcds5tkPTOKRhLJ3KStuAKECoi9DscMW8r6TDNwKTlxCs/s800/nurse03_smile.png' },
            { word: '星星', image: 'https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjaSRety8gtS7fw4SZ6uMq1z3J9QNT8Lm7S1MtEKHhB3D0nOvNIPmSo72EhaaWLgF6GnhQNOqyFKG6XL2ceUwwP4bAKJiqk4ngiDbjfgIrBLTuKVGhMJCp8yE9QwjeirNOOOg35IYJpNPJY/s800/small_star7_yellow.png' },
            { word: '月餅', image: 'https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhT_JHjk1x9QNTcDwrwF3gdhfaK6Scoso10UeoazCdIXYGpn412_2UYSn79CQPrKl0bBs0N9dxQ5TWuVrtvY9kkQUF4dbM8W1S8nBfaHsaSVltIykcDANCHo0JVXXTRGNk1EovoA8IR9n-C/s800/sweets_geppei.png' },
            // 新增擴充字詞（符合原考卷項目）
            { word: '大象', image: 'https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgo7ZgN_pCAtZ7Xp8eN7Nl9fW8eOa9_vXh_M-mH5n9z2oIw6k4m6r9p/s400/animal_zou.png' },
            { word: '蘋果', image: 'https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEi0w8n8r3m9v6x5C7n8m4t2q9w8_v6m7n8r5kG9z2o1w8k5m7r9p/s400/fruit_apple.png' },
            { word: '警察', image: 'https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEj0w8n8r3m9v6x5C7n8m4t2q9w8_v6m7n8r5kG9z2o1w8k5m7r9p/s400/job_keisatsukan_man.png' },
            { word: '汽車', image: 'https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEj0w8n8r3m9v6x5C7n8m4t2q9w8_v6m7n8r5kG9z2o1w8k5m7r9p/s400/car_sedan_red.png' }
        ];

        let currentPairsCount = 6; // 預設簡單版 6 對
        let gameData = [];
        let cards = [];
        let hasFlippedCard = false;
        let lockBoard = false;
        let firstCard, secondCard;
        let matchesFound = 0;
        let timerInterval;
        let secondsElapsed = 0;

        const gameBoard = document.getElementById('game-board');
        const matchesCountSpan = document.getElementById('matches-count');
        const totalPairsSpan = document.getElementById('total-pairs');
        const restartBtn = document.getElementById('restart-btn');
        const timerSpan = document.getElementById('timer');

        // 切換難度等級
        function changeLevel(pairs, buttonElement) {
            if (lockBoard) return; // 遊戲動畫進行中禁止切換
            
            currentPairsCount = pairs;
            
            // 更新按鈕選取狀態
            document.querySelectorAll('.level-btn').forEach(btn => btn.classList.remove('active'));
            buttonElement.classList.add('active');
            
            // 初始化新難度的遊戲
            initGame();
        }

        function startTimer() {
            clearInterval(timerInterval);
            secondsElapsed = 0;
            timerSpan.textContent = secondsElapsed;
            timerInterval = setInterval(() => {
                secondsElapsed++;
                timerSpan.textContent = secondsElapsed;
            }, 1000);
        }

        function initGame() {
            gameBoard.innerHTML = '';
            matchesFound = 0;
            matchesCountSpan.textContent = matchesFound;
            totalPairsSpan.textContent = currentPairsCount;
            
            // 根據設定的對數，從資料庫前方截取對應數量，並打亂順序
            const shuffledFullData = [...fullGameData].sort(() => 0.5 - Math.random());
            gameData = shuffledFullData.slice(0, currentPairsCount);
            
            // 動態調整排版：大於 6 對（即 8 對或 10 對）就改成 4 欄
            if (currentPairsCount > 6) {
                gameBoard.classList.add('grid-4');
            } else {
                gameBoard.classList.remove('grid-4');
            }
            
            const wordCards = gameData.map(item => ({ ...item, type: 'word' }));
            const imageCards = gameData.map(item => ({ ...item, type: 'image' }));

            cards = [...wordCards, ...imageCards].sort(() => 0.5 - Math.random());

            cards.forEach((cardData) => {
                const card = document.createElement('div');
                card.classList.add('card');
                card.dataset.id = cardData.word;

                const front = document.createElement('div');
                front.classList.add('card-front');
    
                const back = document.createElement('div');
                back.classList.add('card-back');

                if (cardData.type === 'word') {
                    back.classList.add('word-card');
                    back.textContent = cardData.word;
                } else {
                    back.classList.add('image-card');
                    const img = document.createElement('img');
                    img.src = cardData.image;
                    img.alt = cardData.word;
                    
                    img.onerror = function() {
                        const fallbacks = { '飛鳥':'🕊️', '小狗':'🐶', '老師':'👨‍🏫', '護士':'👩‍⚕️', '星星':'⭐', '月餅':'🥮', '大象':'🐘', '蘋果':'🍎', '警察':'👮', '汽車':'🚗' };
                        back.innerHTML = `<span style="font-size: 36px;">${fallbacks[cardData.word] || '🖼️'}</span>`;
                    };
                    back.appendChild(img);
                }

                card.appendChild(front);
                card.appendChild(back);
                card.addEventListener('click', flipCard);
                gameBoard.appendChild(card);
            });

            startTimer();
        }

        function flipCard() {
            if (lockBoard) return;
            if (this === firstCard) return;

            this.classList.add('flip');

            if (!hasFlippedCard) {
                hasFlippedCard = true;
                firstCard = this;
                return;
            }

            secondCard = this;
            lockBoard = true; 
            
            setTimeout(checkForMatch, 400);
        }

        function checkForMatch() {
            let isMatch = firstCard.dataset.id === secondCard.dataset.id;
            isMatch ? disableCards() : unflipCards();
        }

        function disableCards() {
            firstCard.removeEventListener('click', flipCard);
            secondCard.removeEventListener('click', flipCard);
            
            firstCard.classList.add('match');
            secondCard.classList.add('match');

            matchesFound++;
            matchesCountSpan.textContent = matchesFound;

            if (matchesFound === gameData.length) {
                clearInterval(timerInterval);
                setTimeout(() => {
                    alert(`🎉 太棒了！你只花了 ${secondsElapsed} 秒就完成了配對！`);
                }, 500);
            }

            resetBoard();
        }

        function unflipCards() {
            firstCard.classList.add('shake');
            secondCard.classList.add('shake');

            setTimeout(() => {
                firstCard.classList.remove('flip', 'shake');
                secondCard.classList.remove('flip', 'shake');
                resetBoard();
            }, 1000);
        }

        function resetBoard() {
            [hasFlippedCard, lockBoard] = [false, false];
            [firstCard, secondCard] = [null, null];
        }

        restartBtn.addEventListener('click', initGame);
        initGame();
    </script>
</body>
</html>
