<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>中文字詞配對遊戲（人物篇）</title>
    <style>
        /* 引入 Google 字型：Noto Serif Hong Kong */
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+HK:wght@500;700&family=ZCOOL+KuaiLe&display=swap');

        * {
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            /* 套用優雅的宋體 */
            font-family: 'Noto Serif HK', 'Noto Sans TC', serif;
            background-color: #fbf6ee; 
            background-image: radial-gradient(#f0e5d8 1px, transparent 0);
            background-size: 24px 24px;
            margin: 0;
            padding: 10px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 460px;
            margin: 0 auto;
            text-align: center;
        }

        /* 標題保留活潑感，其他文字改用宋體 */
        h1 {
            font-family: 'ZCOOL KuaiLe', cursive;
            color: #6d4c41;
            font-size: 24px;
            margin: 5px 0 10px 0;
            text-shadow: 2px 2px 0px #fff;
        }

        .level-selector {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 12px;
        }

        .level-btn {
            flex: 1;
            padding: 8px 5px;
            font-size: 14px;
            font-weight: 700; /* 宋體加粗更明顯 */
            border-radius: 15px;
            background-color: #fff9f2;
            color: #8d6e63;
            border: 2px solid #dfd3c3;
            box-shadow: 0 3px 0px #dfd3c3;
            cursor: pointer;
            transition: all 0.1s ease;
        }

        .level-btn.active {
            background-color: #aed6f1;
            color: white;
            border-color: #85b3d1;
            box-shadow: 0 3px 0px #85b3d1;
            transform: translateY(2px);
        }

        #info-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #fff9f2;
            padding: 10px 15px;
            border-radius: 20px;
            margin-bottom: 15px;
            border: 3px dashed #dfd3c3;
            box-shadow: 0 4px 0px #dfd3c3;
            font-weight: 700;
        }

        /* 漢字卡片使用宋體，展現文字美感 */
        .word-card {
            font-family: 'Noto Serif HK', serif;
            font-size: 24px;
            font-weight: 700;
            color: #5d4037;
        }

        #game-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-gap: 10px;
            perspective: 1000px;
            margin-bottom: 20px;
        }

        #game-board.grid-4 {
            grid-template-columns: repeat(4, 1fr);
            grid-gap: 8px;
        }

        .card {
            background-color: transparent;
            aspect-ratio: 1 / 1;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.2);
            cursor: pointer;
        }

        .card.flip {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            width: 100%;
            height: 100%;
            position: absolute;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 14px;
        }

        .card-front {
            background: url('https://cdn.phototourl.com/free/2026-06-05-26f085c4-f366-4a50-bfaa-992bd501dba9.jpg') no-repeat center center;
            background-size: cover;
            border: 3px solid #fff;
            box-shadow: 0 5px 0px #dfd3c3, 0 8px 12px rgba(0,0,0,0.05);
        }

        .card-back {
            background-color: #ffffff;
            color: #4e342e;
            transform: rotateY(180deg);
            border: 3px solid #fff;
            box-shadow: 0 5px 0px #e0e0e0, 0 8px 12px rgba(0,0,0,0.05);
            padding: 4px;
        }

        .card.match .card-back {
            background-color: #f7fdf9;
            box-shadow: 0 5px 0px #abebd0;
        }
        
        .card.shake {
            animation: shake 0.4s ease-in-out;
        }

        .restart-btn {
            width: 100%;
            padding: 14px;
            font-family: 'Noto Serif HK', sans-serif;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            border: none;
            border-radius: 25px;
            background-color: #ffb37e;
            color: white;
            box-shadow: 0 5px 0px #e0925c;
        }

        @keyframes shake {
            0%, 100% { transform: rotateY(180deg) translateX(0); }
            20%, 60% { transform: rotateY(180deg) translateX(-6px); }
            40%, 80% { transform: rotateY(180deg) translateX(6px); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✨ 一分鐘中文字詞配對遊戲 ✨</h1>
        <div class="level-selector">
            <button class="level-btn active" onclick="changeLevel(6, this)">🌱 簡單 (6對)</button>
            <button class="level-btn" onclick="changeLevel(8, this)">🌲 普通 (8對)</button>
            <button class="level-btn" onclick="changeLevel(10, this)">🌋 困難 (10對)</button>
        </div>
        <div id="info-bar">
            <div>✏️ 已找到: <span id="matches-count">0</span> / <span id="total-pairs">6</span></div>
            <div>⏱️ 時間: <span id="timer">0</span> 秒</div>
        </div>
        <div id="game-board"></div>
        <button class="restart-btn" id="restart-btn">🔄 重新開始玩</button>
    </div>

    <script>
        const fullGameData = [
            { word: '朋友', image: 'https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjEB932hVgaKyqyxeyF06KSDpf1rdTcb0ThAPck3ITd2-YlUkv1lEg5LP31-hrbM803OSOik5fgjSWVU3rIvq137LvTet6dAKjoIZk_cMvIHitiYuLmmFES0lRBe7xeD2cUIyOkadngF1IH/s800/bird_aoitori_bluebird.png' },
            { word: '外婆', image: 'https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEitxnXh3BCHXlUOIPJdO1y51fEPdGCGf9bImEnIUVo_uPy5ECws2w1iAI2wrDs8Sc0oVbtdnYZvFG5UzykV-qvcWamD-Wyj6MOvh6UCTXHPH-5Xf-B5tH-8BqYSvw4roWyud7AgdE_3eXc/s800/pet_omocha_inu.png' },
            { word: '老師', image: 'https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhm_E-H-K-_FgN2faRN8GBGyLGYlBRd7ableXu-UkGQQHSUai1QJpssQsdbjG_JgTOsqL0HB5IuINGRf4jtaT5PmprKYOt0fWzFi6THUTi2-JfCDFdHbtnSCRRiWwrlrcTBq-1MMPVzedw/s800/kid_job_girl_teacher.png' },
            { word: '護士', image: 'https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEi0Xif0qqyS8Xu38KMrotkfwCIJlmgjJR5AG9h81a7ZLd9k6qJRgNht3JRXuS7WZwvrCH113634NAm-VUT51gm3C96ieLUcQ_jcds5tkPTOKRhLJ3KStuAKECoi9DscMW8r6TDNwKTlxCs/s800/nurse03_smile.png' },
            { word: '學生', image: 'https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjaSRety8gtS7fw4SZ6uMq1z3J9QNT8Lm7S1MtEKHhB3D0nOvNIPmSo72EhaaWLgF6GnhQNOqyFKG6XL2ceUwwP4bAKJiqk4ngiDbjfgIrBLTuKVGhMJCp8yE9QwjeirNOOOg35IYJpNPJY/s800/small_star7_yellow.png' },
            { word: '姊妹', image: 'https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhT_JHjk1x9QNTcDwrwF3gdhfaK6Scoso10UeoazCdIXYGpn412_2UYSn79CQPrKl0bBs0N9dxQ5TWuVrtvY9kkQUF4dbM8W1S8nBfaHsaSVltIykcDANCHo0JVXXTRGNk1EovoA8IR9n-C/s800/sweets_geppei.png' },
            { word: '父母', image: 'https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgo7ZgN_pCAtZ7Xp8eN7Nl9fW8eOa9_vXh_M-mH5n9z2oIw6k4m6r9p/s400/animal_zou.png' },
            { word: '司機', image: 'https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEi0w8n8r3m9v6x5C7n8m4t2q9w8_v6m7n8r5kG9z2o1w8k5m7r9p/s400/fruit_apple.png' },
            { word: '警察', image: 'https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEj0w8n8r3m9v6x5C7n8m4t2q9w8_v6m7n8r5kG9z2o1w8k5m7r9p/s400/job_keisatsukan_man.png' },
            { word: '女孩', image: 'https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEj0w8n8r3m9v6x5C7n8m4t2q9w8_v6m7n8r5kG9z2o1w8k5m7r9p/s400/car_sedan_red.png' }
        ];

        let currentPairsCount = 6;
        let lockBoard = false;
        let hasFlippedCard = false;
        let firstCard, secondCard;
        let matchesFound = 0;
        let timerInterval, secondsElapsed = 0;

        function changeLevel(pairs, btn) {
            if(lockBoard) return;
            currentPairsCount = pairs;
            document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            initGame();
        }

        function startTimer() {
            clearInterval(timerInterval);
            secondsElapsed = 0;
            timerInterval = setInterval(() => {
                secondsElapsed++;
                document.getElementById('timer').textContent = secondsElapsed;
            }, 1000);
        }

        function initGame() {
            const board = document.getElementById('game-board');
            board.innerHTML = '';
            matchesFound = 0;
            document.getElementById('matches-count').textContent = 0;
            document.getElementById('total-pairs').textContent = currentPairsCount;
            
            if(currentPairsCount > 6) board.classList.add('grid-4');
            else board.classList.remove('grid-4');

            const subset = [...fullGameData].sort(() => 0.5 - Math.random()).slice(0, currentPairsCount);
            const cards = [...subset, ...subset].sort(() => 0.5 - Math.random());

            cards.forEach(data => {
                const card = document.createElement('div');
                card.classList.add('card');
                card.dataset.id = data.word;
                
                // 這裡簡化結構以符合字體設定
                card.innerHTML = `<div class="card-front"></div><div class="card-back ${data.image ? 'image-card' : 'word-card'}">${data.image ? `<img src="${data.image}">` : data.word}</div>`;
                card.addEventListener('click', flipCard);
                board.appendChild(card);
            });
            startTimer();
        }

        function flipCard() {
            if(lockBoard || this.classList.contains('flip')) return;
            this.classList.add('flip');
            if(!firstCard) { firstCard = this; return; }
            secondCard = this;
            lockBoard = true;
            if(firstCard.dataset.id === secondCard.dataset.id) {
                firstCard.classList.add('match');
                secondCard.classList.add('match');
                matchesFound++;
                document.getElementById('matches-count').textContent = matchesFound;
                if(matchesFound === currentPairsCount) { clearInterval(timerInterval); alert('完成！'); }
                resetBoard();
            } else {
                firstCard.classList.add('shake');
                secondCard.classList.add('shake');
                setTimeout(() => {
                    firstCard.classList.remove('flip', 'shake');
                    secondCard.classList.remove('flip', 'shake');
                    resetBoard();
                }, 1000);
            }
        }
        function resetBoard() { [firstCard, secondCard, lockBoard] = [null, null, false]; }
        document.getElementById('restart-btn').onclick = initGame;
        initGame();
    </script>
</body>
</html>
